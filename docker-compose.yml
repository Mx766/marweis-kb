version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: marweis-pg
    environment:
      POSTGRES_DB: marweis_kb
      POSTGRES_USER: marweis
      POSTGRES_PASSWORD: ${DB_PASSWORD:-marweis_dev}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: marweis-meili
    environment:
      MEILI_MASTER_KEY: ${MEILI_KEY:-marweis_dev_key}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-49Z
    container_name: marweis-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: marweis-gotenberg
    ports:
      - "3000:3000"

volumes:
  pg_data:
  meili_data:
  minio_data:
